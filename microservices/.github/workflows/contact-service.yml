# CI/CD pipeline for contact-service ONLY

name: contact-service CI/CD

on:
  push:
    branches: [master, dev]
    paths:
      - 'microservices/contact-service/**'
  pull_request:
    branches: [master]
    paths:
      - 'microservices/contact-service/**'

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: microservices/contact-service
        run: npm install

      - name: Run tests
        working-directory: microservices/contact-service
        run: npm test

      - name: Health check
        working-directory: microservices/contact-service
        run: |
          node src/index.js &
          sleep 2
          curl --fail http://localhost:3002/health
          kill %1

  deploy:
    name: Deploy contact-service
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy summary
        run: |
          echo "### contact-service deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
