# CI/CD pipeline for projects-service ONLY
#
# KEY CONCEPT — path filtering:
# This pipeline only triggers when files inside
# microservices/projects-service/ change.
#
# If you change contact-service, this pipeline stays silent.
# Each service is completely independent.

name: projects-service CI/CD

on:
  push:
    branches: [master, dev]
    paths:
      - 'microservices/projects-service/**'   # only watch THIS service's folder
  pull_request:
    branches: [master]
    paths:
      - 'microservices/projects-service/**'

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: microservices/projects-service
        run: npm install

      - name: Run tests
        working-directory: microservices/projects-service
        run: npm test

      - name: Health check — verify service starts
        working-directory: microservices/projects-service
        # Start the service in background, wait, hit the /health endpoint,
        # then kill it. This verifies the service actually boots correctly.
        run: |
          node src/index.js &
          sleep 2
          curl --fail http://localhost:3001/health
          kill %1

  deploy:
    name: Deploy projects-service
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy summary
        run: |
          echo "### projects-service deployed" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "In production: this step would build a Docker image," >> $GITHUB_STEP_SUMMARY
          echo "push to a container registry, and tell Kubernetes to roll it out." >> $GITHUB_STEP_SUMMARY
