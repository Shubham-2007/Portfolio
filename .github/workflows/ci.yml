# ============================================================
# PRODUCTION Pipeline
# ============================================================
#
# PURPOSE:
#   Runs on every push to master AND on pull requests targeting master.
#
# PHILOSOPHY:
#   Production is strict. Lint failures BLOCK the deploy.
#   Nothing broken ever reaches real users.
#
# FLOW:
#   push to master
#       │
#       ├── lint-html ──┐
#       │               ├── both pass? → deploy-prod → live site
#       └── lint-css  ──┘   one fails? → deploy skipped
#                                      → notify-failure runs
#
#   pull request to master
#       │
#       ├── lint-html  (feedback before merge)
#       └── lint-css   (deploy never runs on PRs)
# ============================================================

name: Production Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ════════════════════════════════════════════════════════════
  # JOB 1 & 2: LINT  (strictly blocking)
  # ════════════════════════════════════════════════════════════
  # No "continue-on-error" here — failures are hard blocks.
  # Exit code 1 from the linter = job fails = deploy is skipped.
  # ════════════════════════════════════════════════════════════
  lint-html:
    name: Lint HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run HTMLHint
        run: npx htmlhint@1.1.4 "**/*.html" --config .htmlhintrc

  lint-css:
    name: Lint CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Stylelint
        run: npx stylelint@16 "assets/css/**/*.css" --config .stylelintrc.json --allow-empty-input

  # ════════════════════════════════════════════════════════════
  # JOB 3: DEPLOY TO PRODUCTION
  # ════════════════════════════════════════════════════════════
  # Two conditions must BOTH be true:
  #   1. needs: lint jobs must have passed (the gate)
  #   2. if: must be a real push to master, not a PR
  # ════════════════════════════════════════════════════════════
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: pages                  # separate lock from dev
      cancel-in-progress: true

    environment:
      name: github-pages            # the official production environment
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print production deploy summary
        run: |
          echo "### Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════
  # JOB 4: NOTIFY ON FAILURE
  # ════════════════════════════════════════════════════════════
  # "if: failure()" = only runs when any previous job failed.
  # In real companies this sends a Slack/email alert.
  # Here it writes a visible failure card in the Actions UI.
  # ════════════════════════════════════════════════════════════
  notify-failure:
    name: Report Failure
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css, deploy-prod]
    if: failure()

    steps:
      - name: Print failure report
        run: |
          echo "### Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Pushed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Production deploy was blocked. Fix the errors above, then push again." >> $GITHUB_STEP_SUMMARY
